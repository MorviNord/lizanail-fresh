<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Sparkling stars matching the exact style of the sterility icon -->
    <g id="star">
      <path d="M 0,-3 C 0,-0.8 0.8,0 3,0 C 0.8,0 0,0.8 0,3 C 0,0.8 -0.8,0 -3,0 C -0.8,0 0,-0.8 0,-3 Z" fill="#1A1A1A" />
    </g>
    <g id="star-small">
      <path d="M 0,-1.8 C 0,-0.5 0.5,0 1.8,0 C 0.5,0 0,0.5 0,1.8 C 0,0.5 -0.5,0 -1.8,0 C -0.5,0 0,-0.5 0,-1.8 Z" fill="#1A1A1A" />
    </g>
  </defs>

  <!-- Base canvas background -->
  <rect width="100%" height="100%" fill="none" />

  <g transform="translate(0, 4)">
    <!-- Behind / Background Element: CNI Premium Jar (Left-centered behind) -->
    <g transform="translate(26, 52)">
      <!-- Jar Body -->
      <rect x="0" y="0" width="22" height="18" rx="3" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2.8" />
      <!-- Jar Cap -->
      <rect x="2" y="-5" width="18" height="5" rx="1.5" fill="#1A1A1A" />
      <!-- Label Text CNI -->
      <text x="11" y="11" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="6.5" font-weight="900" fill="#1A1A1A" text-anchor="middle" letter-spacing="0.5">CNI</text>
    </g>

    <!-- Center/Right Element: IQ Beauty Gel Polish Bottle (The hero element with the vibrant blue accent) -->
    <g transform="translate(48, 38)">
      <!-- Bottle Body (with the distinctive left-side blue shade matching the craft bag) -->
      <!-- We fill the left portion with #002FA7 -->
      <path d="M 5.5,14 L 1,32 C 0.5,34 2,36 4,36 L 22,36 C 24,36 25.5,34 25,32 L 20.5,14 Z" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2.8" stroke-linejoin="round" />
      <path d="M 5,14 L 1,32 C 0.7,33.5 1.5,35 3,35 L 10,35 L 10,14 Z" fill="#002FA7" />
      
      <!-- Bottle Neck & Cap -->
      <rect x="8" y="10" width="10" height="4" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2.8" />
      <rect x="7" y="0" width="12" height="10" rx="1.5" fill="#1A1A1A" />
      
      <!-- Label "IQ" -->
      <rect x="11.5" y="19" width="11" height="9" rx="1.5" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.8" />
      <text x="17" y="25.5" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="6.5" font-weight="900" fill="#1A1A1A" text-anchor="middle">IQ</text>
    </g>

    <!-- Top / Foreground Overlay Element: 4Blanc Professional Brand Plate / Stylized Filter Cap -->
    <g transform="translate(24, 30)">
      <!-- Elegant label/box for 4BLANC -->
      <rect x="0" y="0" width="30" height="13" rx="4" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="2.8" />
      <text x="15" y="8.5" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="5.8" font-weight="900" fill="#1A1A1A" text-anchor="middle" letter-spacing="0.2">4BLANC</text>
    </g>
  </g>

  <!-- Sparkling decorations for premium vibe -->
  <use href="#star" x="80" y="32" />
  <use href="#star-small" x="74" y="24" />
  <use href="#star" x="18" y="44" />
  <use href="#star-small" x="20" y="54" />
  <use href="#star-small" x="82" y="42" />
</svg>