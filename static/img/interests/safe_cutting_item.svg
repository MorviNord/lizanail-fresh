<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Bright blue magic sparkle -->
    <g id="sparkle-blue">
      <path d="M 0,-14 C 0,-4 4,0 14,0 C 4,0 0,4 0,14 C 0,4 -4,0 -14,0 C -4,0 0,-4 0,-14 Z" fill="#0046FF" />
    </g>
    <!-- Dark contrast sparkle -->
    <g id="sparkle-dark">
      <path d="M 0,-8 C 0,-2.5 2.5,0 8,0 C 2.5,0 0,2.5 0,8 C 0,2.5 -2.5,0 -8,0 C -2.5,0 0,-2.5 0,-8 Z" fill="#1E1E24" />
    </g>
  </defs>

  <g transform="translate(10, 10)">

    <!-- 1. Stylized Finger Outline -->
    <!-- Blue U-shaped frame highlighting the cuticle zone -->
    <path d="M 145,215 L 145,285 C 145,315 165,335 195,335 C 225,335 245,315 245,285 L 245,215" 
          fill="none" stroke="#0046FF" stroke-width="4.5" stroke-linecap="round" />

    <!-- Nail Plate (Grey background with clear borders) -->
    <rect x="152" y="145" width="86" height="135" rx="26" fill="#EAEFF8" stroke="#1E1E24" stroke-width="5" />
    
    <!-- Translucent Lunula / Half-moon inside the nail -->
    <path d="M 160,250 C 160,230 230,230 230,250 Z" fill="#0046FF" opacity="0.2" />

    <!-- 2. Jewelry Diamond (Centered perfectly on the nail plate) -->
    <g transform="translate(195, 195) scale(2)">
      <!-- Main Diamond facets -->
      <path d="M 0,-7 L 7,-3 L 0,6 L -7,-3 Z" fill="#0046FF" stroke="#1E1E24" stroke-width="1.2" stroke-linejoin="round" />
      <path d="M -7,-3 L 7,-3 L 0,-7 Z" fill="#B0C4DE" stroke="#1E1E24" stroke-width="1.2" stroke-linejoin="round" />
      <line x1="0" y1="-7" x2="0" y2="6" stroke="#1E1E24" stroke-width="1" />
    </g>

    <!-- 3. Continuous Cuticle Ribbon (Loops elegantly to the left) -->
    <!-- It starts on the right side of the cuticle area, sweeps across, and loops away -->
    <path d="M 235,260 C 210,255 170,250 160,250 C 135,250 115,225 125,190 C 135,160 165,190 180,222" 
          fill="none" stroke="#1E1E24" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />

    <!-- 4. Scissors (Beautifully oriented) -->
    <!-- The scissor blades meet exactly at the cutting point of the cuticle ribbon -->
    <g transform="translate(182, 222) rotate(-22)">
      <!-- Pivot Joint / Blue Screw -->
      <circle cx="0" cy="0" r="6" fill="#0046FF" stroke="#1E1E24" stroke-width="3.5" />
      <circle cx="0" cy="0" r="1.5" fill="#FFFFFF" />

      <!-- Upper Blade (Cutting edge) -->
      <path d="M -2,-2 C -30,-8 -60,-10 -95,-6 C -65,-1 -35,-1 -2,-2" fill="#E2E8F0" stroke="#1E1E24" stroke-width="4.5" stroke-linejoin="round"/>
      
      <!-- Lower Blade -->
      <path d="M -2,2 C -28,10 -55,20 -88,25 C -58,14 -28,8 -2,2" fill="#CBD5E0" stroke="#1E1E24" stroke-width="4.5" stroke-linejoin="round"/>

      <!-- Upper handle bar -->
      <path d="M 2,-1 L 65,-18" stroke="#1E1E24" stroke-width="5" stroke-linecap="round" />
      <!-- Upper finger ring -->
      <circle cx="90" cy="-25" r="22" fill="none" stroke="#1E1E24" stroke-width="5.5" />
      
      <!-- Lower handle bar -->
      <path d="M 2,2 L 60,18" stroke="#1E1E24" stroke-width="5" stroke-linecap="round" />
      <!-- Lower finger ring -->
      <circle cx="83" cy="32" r="22" fill="none" stroke="#1E1E24" stroke-width="5.5" />
    </g>

    <!-- 5. Decorative Premium Sparkles -->
    <use href="#sparkle-blue" x="90" y="110" />
    <use href="#sparkle-dark" x="75" y="150" />
    <use href="#sparkle-dark" x="120" y="85" />
    <use href="#sparkle-blue" x="290" y="190" />
    <use href="#sparkle-dark" x="270" y="240" />

  </g>
</svg>